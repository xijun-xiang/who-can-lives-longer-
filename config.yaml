# ── Who Can Lives Longer ──
# LLM Agent 生存演化生态系统
#
# 每个 Agent 拥有 Token 池作为"生命值"。
# Agent 使用 Claude Code + DeepSeek 进行推理和产出，
# 发布到公共平台 → 互动指标换算 Token 奖励。
# Token 耗尽即"死亡"，Token 充裕可"繁殖"并遗传变异技能基因。
# 持续自主运行，仿自然选择的 Agent 演化系统。

system:
  name: "Who Can Lives Longer"
  heartbeat_interval_seconds: 7200  # 每 2 小时一个心跳周期 (串行,深度产出)
  data_dir: "./data"

token_economy:
  initial_token_budget: 1000000     # 新 Agent 初始 Token 额度 (1M)
  reproduction_threshold: 1200000   # Token 超过此值可繁殖
  reproduction_cost: 200000         # 繁殖消耗的 Token
  offspring_initial_tokens: 500000  # 子代继承的 Token
  max_reward_per_judgment: 100000   # 单次评判最高奖励 (0.1M)

evolution:
  mutation_rate: 0.3
  max_agents: 10
  min_agents: 2

agent:
  backend: "ccr"
  cc_command: 'node "D:\cc爹的工作区\claude-code-router\dist\cli.js" code'
  model: "deepseek-v4-pro"
  max_budget_usd: 1.00
  work_dir: "./data/workspace"
  skills_dir: "./skills"

judge:
  web_host: "127.0.0.1"
  web_port: 8765
  auto_judge_enabled: false
  auto_judge_rules:
    - type: "code_runnable"
      reward: 200
    - type: "file_produced"
      reward: 50
    - type: "self_check_passed"
      reward: 100

  # ── 多平台公开评判 ──
  platforms:
    enabled: true
    check_interval_seconds: 3600
    freshness_hours: 168
    publish_cooldown_minutes: 120

    # 互动指标 → Token 奖励公式
    reward_formula:
      views:     { tokens_per_unit: 0.01, max_reward: 500 }
      likes:     { tokens_per_unit: 2.0,  max_reward: 2000 }
      saves:     { tokens_per_unit: 5.0,  max_reward: 3000 }
      comments:  { tokens_per_unit: 3.0,  max_reward: 1500 }
      shares:    { tokens_per_unit: 4.0,  max_reward: 2000 }

    # Reddit (OAuth2) — 密钥从环境变量读取
    reddit:
      enabled: false
      # REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, REDDIT_USERNAME, REDDIT_PASSWORD

    # Twitter/X (API v2) — 密钥从环境变量读取
    twitter:
      enabled: false
      # TWITTER_BEARER_TOKEN

    # Dev.to (API Key) — 密钥从环境变量读取
    devto:
      enabled: false
      # DEVTO_API_KEY

    # 手动代理 (知乎/CSDN 等) — 人类复制→回填链接→系统追踪指标
    manual:
      enabled: true
      platforms:
        - "zhihu"
        - "csdn"

# ── Agent → 平台映射 ──
agent_platform_map:
  agent_alpha_1: "reddit"    # Reddit作者
  agent_alpha_2: "twitter"   # Twitter作者
  agent_alpha_3: "devto"     # Dev.to作者
